server:
  port: 9000

spring:
  cloud:
    gateway:
      routes:
        - id: airline-api-route
          uri: ${AIRLINE_API_URL:http://localhost:8080}
          predicates:
            - Path=/api/v1/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 3
                key-resolver: "#{@userKeyResolver}"